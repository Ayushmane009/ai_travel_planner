<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Custom Scrollbar for a clean look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* The "Half-Map" Sticky Logic */
        #map-container { height: calc(100vh - 100px); position: sticky; top: 20px; }
        #map { height: 100%; width: 100%; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 4px solid white; }
        
        /* Card Styling for Itinerary */
        .itinerary-step { 
            background: white; 
            padding: 1.5rem; 
            border-radius: 1.25rem; 
            border-left: 8px solid #4f46e5; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .itinerary-step:hover { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        #itinerary-content h3 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin: 2rem 0 1rem 0; }
        #itinerary-content ul { display: flex; flex-direction: column; gap: 0.75rem; }
        #itinerary-content li { list-style: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-[1400px] mx-auto px-6 py-10">
        
        <header class="mb-10 animate__animated animate__fadeInDown">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 bg-white p-8 rounded-[32px] shadow-xl border border-slate-100">
                <div class="max-w-xs">
                    <h1 class="text-3xl font-black text-indigo-600 italic">AI.EXPLORER</h1>
                    <p class="text-slate-400 text-sm">One click to your next adventure.</p>
                </div>
                
                <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="destination" placeholder="Destination (e.g. Tokyo)" class="bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold">
                    <input type="number" id="days" placeholder="Days" class="bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold">
                    <select id="style" class="bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold cursor-pointer">
                        <option value="Luxury">💎 Luxury</option>
                        <option value="Adventure">🧗 Adventure</option>
                        <option value="Budget">💰 Budget</option>
                    </select>
                </div>

                <button id="generate-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition-all active:scale-95 whitespace-nowrap">
                    Go! 🚀
                </button>
            </div>
        </header>

        <div id="loading" class="hidden text-center py-20 animate__animated animate__pulse animate__infinite">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p id="loading-text" class="text-indigo-600 font-bold text-xl">Mapping your journey...</p>
        </div>

        <div id="output-container" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="order-2 lg:order-1">
                <div id="map-container">
                    <div id="map" class="animate__animated animate__fadeInLeft"></div>
                </div>
            </div>

            <div class="order-1 lg:order-2 animate__animated animate__fadeInRight">
                <div id="visual-header" class="mb-8">
                    </div>
                
                <div id="itinerary-content">
                    </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>

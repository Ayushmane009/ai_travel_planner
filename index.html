<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Concierge 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* Modern Map Styling */
        #map { height: 400px; width: 100%; border-radius: 20px; margin-bottom: 30px; border: 6px solid white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        /* Hero Image - Overlaps the container for depth */
        .hero-img { width: 100%; height: 380px; object-fit: cover; border-radius: 24px; margin-bottom: -60px; position: relative; z-index: 10; border: 8px solid white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        
        /* Custom Itinerary Bullet Points (Card Style) */
        #itinerary-content h3 { font-size: 1.75rem; font-weight: 800; color: #4338ca; margin-top: 3rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
        #itinerary-content ul { list-style: none; padding-left: 0; display: flex; flex-direction: column; gap: 12px; }
        #itinerary-content li { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            border-left: 6px solid #6366f1; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #itinerary-content li:hover { transform: scale(1.02) translateX(15px); background: #fdfeff; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen text-slate-900 pb-24">

    <div class="max-w-4xl mx-auto pt-16 px-6">
        <header class="text-center mb-16 animate__animated animate__fadeInDown">
            <span class="px-4 py-1.5 bg-indigo-100 text-indigo-600 rounded-full text-xs font-bold uppercase tracking-widest">Next-Gen Travel AI</span>
            <h1 class="text-6xl font-black text-slate-900 mt-4 mb-4 tracking-tight">World Explorer <span class="text-indigo-600">.</span></h1>
            <p class="text-slate-500 text-lg max-w-lg mx-auto leading-relaxed">Personalized, visual itineraries powered by the world's most advanced AI models.</p>
        </header>

        <div class="glass-panel p-10 rounded-[32px] shadow-2xl mb-12 animate__animated animate__fadeIn">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                <div class="space-y-3">
                    <label class="text-sm font-black text-slate-400 uppercase tracking-tighter">Destination</label>
                    <input type="text" id="destination" placeholder="Santorini, Greece" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold">
                </div>
                <div class="space-y-3">
                    <label class="text-sm font-black text-slate-400 uppercase tracking-tighter">Days</label>
                    <input type="number" id="days" placeholder="4" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold">
                </div>
                <div class="space-y-3">
                    <label class="text-sm font-black text-slate-400 uppercase tracking-tighter">Trip Vibe</label>
                    <select id="style" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold cursor-pointer">
                        <option value="Luxury">💎 Luxury Elite</option>
                        <option value="Adventure">🧗 Pure Adventure</option>
                        <option value="Cultural">🏛️ Deep Culture</option>
                        <option value="Relaxing">🧘 Total Zen</option>
                    </select>
                </div>
            </div>
            <button id="generate-btn" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-5 rounded-2xl transition-all active:scale-95 shadow-xl flex justify-center items-center gap-3 group">
                Generate My Journey <span class="group-hover:translate-x-2 transition-transform">🚀</span>
            </button>
        </div>

        <div id="loading" class="hidden text-center py-20 animate__animated animate__fadeIn">
            <div class="relative w-24 h-24 mx-auto mb-8">
                <div class="absolute inset-0 border-8 border-indigo-100 rounded-full"></div>
                <div class="absolute inset-0 border-8 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <h3 id="loading-text" class="text-2xl font-black text-indigo-600 animate__animated animate__pulse animate__infinite">Summoning the AI...</h3>
            <p class="text-slate-400 mt-2">Checking maps and scanning local gems</p>
        </div>

        <div id="output-container" class="hidden">
            <div id="visual-header" class="animate__animated animate__fadeInUp"></div>
            <div id="map" class="animate__animated animate__zoomIn animate__delay-1s"></div>
            <div id="itinerary-content" class="animate__animated animate__fadeInUp animate__delay-1s"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>

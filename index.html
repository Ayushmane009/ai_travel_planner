<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Explorer | Multi-Pin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Sticky Map Layout */
        .sticky-map { position: sticky; top: 2rem; height: calc(100vh - 4rem); }
        #map { height: 100%; width: 100%; border-radius: 2rem; border: 8px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

        /* Card Styling */
        .itinerary-step { 
            background: white; padding: 1.5rem; border-radius: 1.25rem; border-left: 6px solid #4f46e5; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); margin-bottom: 1rem; transition: all 0.3s ease;
        }
        .itinerary-step:hover { transform: translateX(10px); background: #fdfdff; }

        #itinerary-content h3 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin: 2.5rem 0 1rem 0; display: flex; align-items: center; gap: 0.5rem; }
        .wiki-image { width: 100%; height: 400px; object-fit: cover; border-radius: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 8px solid white; margin-bottom: 2rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div class="max-w-[1500px] mx-auto px-6 py-8">
        
        <header class="mb-8 animate__animated animate__fadeInDown">
            <div class="bg-white/80 backdrop-blur-md p-6 rounded-[2.5rem] shadow-xl border border-white flex flex-col lg:flex-row items-center gap-6">
                <div class="flex items-center gap-3 px-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl">📍</div>
                    <div>
                        <h1 class="text-xl font-extrabold leading-none">PLANNER.AI</h1>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Multi-Pin System</span>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                    <input type="text" id="destination" placeholder="City (e.g. London)" class="bg-slate-100/50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold transition-all">
                    <input type="number" id="days" placeholder="Days" class="bg-slate-100/50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold transition-all">
                    <select id="style" class="bg-slate-100/50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold cursor-pointer">
                        <option value="Luxury">💎 Luxury</option>
                        <option value="Adventure">🧗 Adventure</option>
                        <option value="Culture">🏛️ Culture</option>
                    </select>
                </div>

                <button id="generate-btn" class="w-full lg:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all active:scale-95">
                    Generate
                </button>
            </div>
        </header>

        <div id="loading" class="hidden text-center py-24">
            <div class="w-20 h-20 border-8 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mx-auto mb-6"></div>
            <h2 id="loading-text" class="text-2xl font-black text-indigo-600">Syncing Data...</h2>
        </div>

        <div id="output-container" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            <div class="order-2 lg:order-1 sticky-map">
                <div id="map"></div>
            </div>
            <div class="order-1 lg:order-2 space-y-8">
                <div id="visual-header"></div>
                <div id="itinerary-content"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
